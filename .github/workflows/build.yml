name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-amiga:
    name: Amiga (vbcc, 68020)
    runs-on: ubuntu-latest
    container:
      image: walkero/docker4amigavbcc:latest-m68k
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir -p build
          vc +aos68k -c99 -cpu=68020 -O2 \
            -I$NDK_INC \
            -DPADDLE_SPEED=6 -DBALL_SPEED=5 \
            -o build/breakout \
            src/main.c src/game.c src/platform_amiga.c \
            -lamiga

      - name: Verify binary
        run: ls -la build/breakout

      - name: Bundle icon
        run: cp assets/breakout.info build/breakout.info

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-amiga-68020
          path: |
            build/breakout
            build/breakout.info

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Build
        run: |
          cc -std=c99 -Wall -Wextra -O2 \
            $(sdl2-config --cflags) \
            -o breakout \
            src/main.c src/game.c src/platform_sdl2.c \
            $(sdl2-config --libs)

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib
          cp breakout AppDir/usr/bin/
          chmod +x AppDir/usr/bin/breakout
          cp assets/icon_256.png AppDir/breakout.png
          cp src/breakout.desktop AppDir/breakout.desktop
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/icon_256.png AppDir/usr/share/icons/hicolor/256x256/apps/breakout.png
          mkdir -p AppDir/usr/share/applications
          cp src/breakout.desktop AppDir/usr/share/applications/
          cp /usr/lib/x86_64-linux-gnu/libSDL2-2.0.so.0 AppDir/usr/lib/
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/breakout" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir Breakout-linux-x86_64.AppImage

      - name: Verify AppImage
        run: |
          ls -la Breakout-linux-x86_64.AppImage
          file Breakout-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-linux-x86_64
          path: Breakout-linux-x86_64.AppImage

  build-macos:
    name: macOS (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Build .app bundle
        run: make -f Makefile.sdl2 bundle

      - name: Verify bundle
        run: |
          ls -la Breakout.app/Contents/MacOS/breakout
          file Breakout.app/Contents/MacOS/breakout
          otool -L Breakout.app/Contents/MacOS/breakout | grep -v SDL2 || true

      - name: Zip bundle
        run: |
          cp scripts/update.sh .
          chmod +x update.sh
          zip -r breakout-macos-arm64.zip Breakout.app update.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-macos-arm64
          path: breakout-macos-arm64.zip

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2

      - name: Build
        run: |
          windres src/app.rc -o app.res.o
          gcc -std=c99 -Wall -Wextra -O2 \
            $(sdl2-config --cflags) \
            -o breakout-windows-x86_64.exe \
            src/main.c src/game.c src/platform_sdl2.c app.res.o \
            $(sdl2-config --libs)

      - name: Bundle SDL2.dll
        run: |
          mkdir -p dist
          cp breakout-windows-x86_64.exe dist/
          cp /mingw64/bin/SDL2.dll dist/
          cp scripts/update.ps1 dist/
          echo "Breakout — https://github.com/$GITHUB_REPOSITORY" > dist/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-windows-x86_64
          path: dist/

  build-web:
    name: Web (Emscripten/WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build
        run: emmake make -f Makefile.web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-web
          path: build/web/

  build-whdload:
    name: WHDLoad package
    needs: [build-amiga]
    runs-on: ubuntu-latest
    container:
      image: walkero/docker4amigavbcc:latest-m68k
    steps:
      - uses: actions/checkout@v4

      - name: Download Amiga binary
        uses: actions/download-artifact@v4
        with:
          name: breakout-amiga-68020
          path: amiga-bin

      - name: Download WHDLoad DEV
        run: |
          curl -fL -o /tmp/WHDLoad_dev.lha "https://whdload.de/whdload/WHDLoad_dev.lha"
          mkdir -p /tmp/whdload
          cd /tmp/whdload && lha x /tmp/WHDLoad_dev.lha

      - name: Assemble slave
        run: |
          mkdir -p build
          vasmm68k_mot -devpac -nosym -Fhunkexe \
            -Isrc/whdload \
            -I/tmp/whdload/WHDLoad/Include \
            -I/tmp/whdload/WHDLoad/Src/sources \
            -I/opt/sdk/NDK_3.9/Include/include_i \
            -I/opt/sdk/NDK3.2/Include_I \
            -o build/Breakout.slave \
            src/whdload/Breakout.asm

      - name: Verify slave
        run: ls -la build/Breakout.slave

      - name: Package WHDLoad archive
        run: |
          mkdir -p whdload/data
          cp build/Breakout.slave whdload/
          cp amiga-bin/breakout whdload/data/
          cp assets/breakout_whdload.info whdload/Breakout.info
          touch whdload/Breakout
          tar czf breakout-whdload.tar.gz -C whdload .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-whdload
          path: breakout-whdload.tar.gz

  release:
    name: Create Release
    needs: [build-amiga, build-linux, build-macos, build-windows, build-whdload, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          path: repo

      - name: Package archives
        run: |
          cd artifacts
          tar czf ../breakout-amiga-68020.tar.gz -C breakout-amiga-68020 breakout breakout.info
          cp breakout-linux-x86_64/Breakout-linux-x86_64.AppImage ../Breakout-linux-x86_64.AppImage
          chmod +x ../Breakout-linux-x86_64.AppImage
          cp breakout-macos-arm64/breakout-macos-arm64.zip ../breakout-macos-arm64.zip
          cd breakout-windows-x86_64 && zip -r ../../breakout-windows-x86_64.zip . && cd ..
          cd ..
          cp repo/scripts/update.sh .
          chmod +x update.sh
          cp artifacts/breakout-whdload/breakout-whdload.tar.gz .
          cd artifacts/breakout-web && zip -r ../../breakout-web.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            breakout-amiga-68020.tar.gz
            Breakout-linux-x86_64.AppImage
            breakout-macos-arm64.zip
            breakout-windows-x86_64.zip
            breakout-whdload.tar.gz
            breakout-web.zip
            update.sh
